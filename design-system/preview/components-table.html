<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  .tbl-card { padding: 0; }
  table.demo {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }
  table.demo th {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    font-size: var(--text-sm);
    color: var(--fg-dim);
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
  }
  table.demo td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-sans);
    font-variant-numeric: tabular-nums;
    font-size: var(--text-sm);
    color: var(--fg-secondary);
  }
  table.demo td code {
    font-family: var(--font-code);
    font-size: 0.78rem;
    color: var(--fg-secondary);
  }
  table.demo td.dim { color: var(--fg-dimmer); }
  table.demo tr.eligible td:first-child {
    border-left: 2px solid var(--state-success-fg);
    color: var(--fg);
  }
  .meta {
    padding: 8px 14px 12px;
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--fg-dimmer);
  }
</style>
</head><body>
<div class="card tbl-card">
<table class="demo">
  <thead><tr>
    <th>Name</th>
    <th>Capabilities</th>
    <th>State</th>
    <th>Last used</th>
  </tr></thead>
  <tbody>
    <tr>
      <td>x11-gpu-01</td>
      <td><code>{"runtime":"x11","gpu":true}</code></td>
      <td><span class="pill free">free</span></td>
      <td class="dim">3m ago</td>
    </tr>
    <tr class="eligible">
      <td>x11-gpu-02</td>
      <td><code>{"runtime":"x11","gpu":true}</code></td>
      <td><span class="pill busy">busy</span></td>
      <td class="dim">just now</td>
    </tr>
    <tr>
      <td>headless-04</td>
      <td><code>{"runtime":"linux"}</code></td>
      <td><span class="pill drain">drained</span></td>
      <td class="dim">2d ago</td>
    </tr>
  </tbody>
</table>
<div class="meta">eligible row gets a 2px green left-rail — same rail vocabulary as buttons / pills / sidebar selection</div>
</div>
</body></html>
