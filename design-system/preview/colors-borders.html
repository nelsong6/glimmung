<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="lbl">Borders & lines</div>
  <div class="row">
    <div class="swatch" style="background:#0e0e10;border:1px solid #2a2a2e">
      <div><div class="name" style="color:#d4d4d4">border</div><div class="hex" style="color:#888">#2a2a2e</div></div>
      <div style="font-size:10px;color:#666">default 1px</div>
    </div>
    <div class="swatch" style="background:#0e0e10;border:1px solid #3a3a3e">
      <div><div class="name" style="color:#d4d4d4">border-strong</div><div class="hex" style="color:#888">#3a3a3e</div></div>
      <div style="font-size:10px;color:#666">hover state</div>
    </div>
    <div class="swatch" style="background:#0e0e10;border:1px solid #5a3a14">
      <div><div class="name" style="color:#d4d4d4">border-running</div><div class="hex" style="color:#888">#5a3a14</div></div>
      <div style="font-size:10px;color:#666">attempt running</div>
    </div>
    <div class="swatch" style="background:#0e0e10;border:1px dashed #2a2a2e">
      <div><div class="name" style="color:#d4d4d4">border-dashed</div><div class="hex" style="color:#888">#2a2a2e</div></div>
      <div style="font-size:10px;color:#666">empty states</div>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:14px;align-items:center">
    <div style="background:#15151a;padding:10px 16px;border-left:2px solid #4ade80;color:#e8e8e8;font-size:12px">selected — green stripe</div>
    <div style="background:#15151a;padding:10px 16px;border-left:2px solid #60a5fa;color:#d4d4d4;font-size:12px">workflow — blue stripe</div>
  </div>
</div>
</body></html>
