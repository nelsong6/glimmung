<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../plate.css">
<style>
  .run { --plate-c: 12px; --plate-bg: var(--bg-deep); padding: 14px 16px; }
  .run-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 18px; margin-bottom: 12px; font-size: 0.85rem; }
  .k { color: var(--fg-dim); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.06em; font-family: var(--font-sans); margin-right: 6px; }
  .v { font-family: var(--font-sans); color: var(--fg); }

  .att { --plate-c: 8px; --plate-bg: var(--bg-deepest); padding: 10px 12px; margin-bottom: 8px; }
  .att.running { --plate-rail: var(--state-busy-fg); --plate-edge: color-mix(in srgb, var(--state-busy-fg) 35%, var(--border)); }
  .att-head { display: flex; align-items: center; gap: 10px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.72rem; font-weight: 500; }
  .pill.pass { background: var(--state-success-bg); color: var(--state-success-fg); }
  .pill.run  { background: var(--state-busy-bg);    color: var(--state-busy-fg); }
  .att-meta { font-family: var(--font-sans); font-size: 0.78rem; color: var(--fg-dim); }
  .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 999px; background: var(--state-busy-fg); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
</style>
</head><body>
<div class="card">
  <div class="lbl">Attempt card · run panel</div>
  <div class="run plate">
    <div class="run-meta">
      <div><span class="k">run</span><span class="v">01HKQX2A…</span></div>
      <div><span class="k">attempts</span><span class="v">2 / 3</span></div>
      <div><span class="k">cost</span><span class="v">$4.20</span></div>
    </div>
    <div class="att plate">
      <div class="att-head">
        <span class="pill pass">pass</span>
        <span class="att-meta">attempt 0 · 2m 14s</span>
      </div>
    </div>
    <div class="att plate running">
      <div class="att-head">
        <span class="pill run">running</span>
        <span class="att-meta">attempt 1</span>
        <span class="live-dot"></span>
      </div>
    </div>
  </div>
</div>
</body></html>
