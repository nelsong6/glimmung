<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="lbl">Attempt card · run-panel</div>
  <div style="border:1px solid #2a2a2e;border-radius:6px;background:#0a0a0c;padding:12px 14px">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px 18px;margin-bottom:12px;font-size:0.85rem">
      <div><span style="color:#888;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.04em;margin-right:4px">run</span><span style="font-family:ui-monospace,monospace;color:#d4d4d4">01HKQX2A…</span></div>
      <div><span style="color:#888;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.04em;margin-right:4px">attempts</span><span style="font-family:ui-monospace,monospace;color:#d4d4d4">2 / 3</span></div>
      <div><span style="color:#888;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.04em;margin-right:4px">cost</span><span style="font-family:ui-monospace,monospace;color:#d4d4d4">$4.20</span></div>
    </div>
    <div style="border:1px solid #2a2a2e;border-radius:4px;background:#050507;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#14532d;color:#4ade80;font-size:0.75rem;font-weight:500">pass</span>
        <span style="font-family:ui-monospace,monospace;font-size:0.8rem;color:#888">attempt 0 · 2m 14s</span>
      </div>
    </div>
    <div style="border:1px solid #5a3a14;border-radius:4px;background:#050507;padding:10px 12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#422006;color:#fb923c;font-size:0.75rem;font-weight:500">running</span>
        <span style="font-family:ui-monospace,monospace;font-size:0.8rem;color:#888">attempt 1</span>
        <span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:#fb923c;animation:pulse-anim 1.6s ease-in-out infinite"></span>
      </div>
    </div>
  </div>
</div>
</body></html>
