<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="lbl">Buttons & links</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button style="background:#14532d;color:#4ade80;border:none;padding:8px 16px;border-radius:4px;font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer">submit</button>
    <button style="background:#14532d;color:#4ade80;border:none;padding:8px 16px;border-radius:4px;font-family:inherit;font-size:0.9rem;font-weight:500;opacity:0.5">submit (disabled)</button>
    <button style="background:transparent;border:1px solid #2a2a2e;color:#d4d4d4;padding:4px 12px;border-radius:4px;font-family:inherit;font-size:0.85rem">admin</button>
    <button style="background:transparent;border:1px solid #3a3a3e;color:#d4d4d4;padding:4px 12px;border-radius:4px;font-family:inherit;font-size:0.85rem;background:#15151a">admin (hover)</button>
    <a style="color:#4ade80;font-size:0.85rem">refresh</a>
    <span style="color:#f87171;font-size:0.85rem">cancel?</span>
    <span style="color:#666">/</span>
    <span style="color:#d4d4d4;font-size:0.85rem">keep</span>
  </div>
  <div style="margin-top:12px;font-family:ui-monospace,monospace;font-size:10px;color:#666">primary submit (green) · ghost link (border) · inline link (green) · two-step danger confirm</div>
</div>
</body></html>
