<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="lbl">Form inputs</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <label style="display:flex;align-items:center;gap:12px;font-size:0.9rem">
      <span style="width:120px;color:#888;font-size:0.85rem">name</span>
      <input style="flex:1;background:#0e0e10;border:1px solid #2a2a2e;color:#d4d4d4;padding:6px 10px;border-radius:4px;font-family:inherit;font-size:0.9rem" value="spirelens"/>
    </label>
    <label style="display:flex;align-items:center;gap:12px;font-size:0.9rem">
      <span style="width:120px;color:#888;font-size:0.85rem">github_repo</span>
      <input style="flex:1;background:#0e0e10;border:1px solid #4ade80;color:#d4d4d4;padding:6px 10px;border-radius:4px;font-family:ui-monospace,monospace;font-size:0.85rem;outline:none" value="nelsong6/spirelens"/>
    </label>
    <label style="display:flex;align-items:center;gap:12px;font-size:0.9rem">
      <span style="width:120px;color:#888;font-size:0.85rem">project</span>
      <select style="flex:1;background:#0e0e10;border:1px solid #2a2a2e;color:#d4d4d4;padding:6px 10px;border-radius:4px;font-family:inherit;font-size:0.9rem">
        <option>spirelens</option><option>ambience</option>
      </select>
    </label>
    <div style="font-family:ui-monospace,monospace;font-size:10px;color:#666">label width 120px · input bg #0e0e10 · focus #4ade80 (no ring) · 160px label in real form</div>
  </div>
</div>
</body></html>
