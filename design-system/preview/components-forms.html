<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../plate.css">
<style>
  .form { display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
  .field > .label { width: 120px; color: var(--fg-dim); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-sans); }

  /* Console-plate input. */
  .pinput {
    flex: 1; position: relative; height: 32px;
    --plate-c: 8px; --plate-bg: var(--bg-deep);
  }
  .pinput input, .pinput select {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    background: transparent; border: none; outline: none;
    color: var(--fg); padding: 0 12px 0 12px;
    font-family: var(--font-sans); font-size: 0.85rem;
  }
  .pinput.mono input { font-family: var(--font-sans); font-size: 0.8rem; color: var(--fg); }
  .pinput.focused { --plate-rail: var(--state-success-fg);
    --plate-edge: color-mix(in srgb, var(--state-success-fg) 38%, var(--border)); }
</style>
</head><body>
<div class="card">
  <div class="lbl">Form inputs — console plate</div>
  <div class="form">
    <label class="field">
      <span class="label">name</span>
      <span class="pinput plate"><input value="spirelens" /></span>
    </label>
    <label class="field">
      <span class="label">github_repo</span>
      <span class="pinput plate mono focused"><input value="nelsong6/spirelens" /></span>
    </label>
    <label class="field">
      <span class="label">project</span>
      <span class="pinput plate"><select><option>spirelens</option><option>ambience</option></select></span>
    </label>
    <label class="field">
      <span class="label">capabilities</span>
      <span class="pinput plate mono"><input value='{"runtime":"x11","gpu":true}' /></span>
    </label>
    <div style="font-family:var(--font-sans);font-size:10px;color:var(--fg-dimmer);margin-top:4px">
      mono uppercase labels · plate body · focused state lights the leading-edge rail green
    </div>
  </div>
</div>
</body></html>
