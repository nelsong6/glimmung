<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  .row { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .meta { font-family: var(--font-sans); font-size: 10px; color: var(--fg-dimmer); width: 88px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.08em; }
  .note { font-family: var(--font-sans); font-size: 10px; color: var(--fg-dim); }
  .dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 999px; background: var(--state-busy-fg);
    animation: pulse 1.6s ease-in-out infinite;
  }
</style>
</head><body>
<div class="card">
  <div class="lbl">Pills — console tag</div>

  <div class="row">
    <div class="meta">host</div>
    <span class="pill free">free</span>
    <span class="pill busy">busy</span>
    <span class="pill drain">drained</span>
  </div>

  <div class="row">
    <div class="meta">stream</div>
    <span class="pill free">live</span>
    <span class="pill busy">stale</span>
    <span class="pill drain">dead</span>
  </div>

  <div class="row">
    <div class="meta">run state</div>
    <span class="pill free">passed</span>
    <span class="pill busy">in_progress</span>
    <span class="pill drain">aborted</span>
    <span class="pill info">issue-agent</span>
  </div>

  <div class="row">
    <div class="meta">atoms</div>
    <span class="dot"></span>
    <span class="note">live-dot · pulse 1.6s (stays round — it's a dot)</span>
    <span class="count-pill">12</span>
    <span class="note">count-pill · neutral, no rail</span>
  </div>
</div>
</body></html>
