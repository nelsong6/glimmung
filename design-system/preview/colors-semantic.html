<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="lbl">Semantic — status colors (paired bg + fg)</div>
  <div class="row">
    <div class="swatch" style="background:#14532d;color:#4ade80">
      <div><div class="name">success / free / live</div><div class="hex">bg #14532d · fg #4ade80</div></div>
      <div><span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#14532d;color:#4ade80;font-size:10px;font-weight:500">free</span></div>
    </div>
    <div class="swatch" style="background:#422006;color:#fb923c">
      <div><div class="name">busy / stale</div><div class="hex">bg #422006 · fg #fb923c</div></div>
      <div><span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#422006;color:#fb923c;font-size:10px;font-weight:500">busy</span></div>
    </div>
  </div>
  <div class="row" style="margin-top:12px">
    <div class="swatch" style="background:#3f1c1c;color:#f87171">
      <div><div class="name">drain / dead / abort</div><div class="hex">bg #3f1c1c · fg #f87171</div></div>
      <div><span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#3f1c1c;color:#f87171;font-size:10px;font-weight:500">drained</span></div>
    </div>
    <div class="swatch" style="background:#1e3a5f;color:#60a5fa">
      <div><div class="name">workflow accent</div><div class="hex">bg #1e3a5f · fg #60a5fa</div></div>
      <div><span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#1e3a5f;color:#60a5fa;font-size:10px;font-weight:500">issue-agent</span></div>
    </div>
  </div>
</div>
</body></html>
