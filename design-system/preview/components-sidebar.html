<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="lbl">Sidebar — project / workflow nav</div>
  <div style="background:#0a0a0c;border:1px solid #2a2a2e;border-radius:4px;padding:14px 0;width:240px">
    <div style="font-size:0.75rem;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.1em;padding:0 20px 10px;border-bottom:1px solid #2a2a2e;margin-bottom:6px">PROJECTS</div>
    <button style="display:flex;width:100%;justify-content:space-between;align-items:center;padding:8px 20px;background:transparent;border:none;color:#b8b8b8;font-family:inherit;font-size:0.9rem;text-align:left;border-left:2px solid transparent">
      <span>All</span>
      <span style="background:#1a1a1f;color:#555;padding:2px 8px;border-radius:999px;font-size:0.75rem;font-family:ui-monospace,monospace">7</span>
    </button>
    <button style="display:flex;width:100%;justify-content:space-between;align-items:center;padding:8px 20px;background:#15151a;border:none;color:#e8e8e8;font-family:inherit;font-size:0.9rem;text-align:left;border-left:2px solid #4ade80;font-weight:500">
      <span>spirelens</span>
      <span style="background:#14532d;color:#4ade80;padding:2px 8px;border-radius:999px;font-size:0.75rem;font-family:ui-monospace,monospace">3</span>
    </button>
    <button style="display:flex;width:100%;justify-content:space-between;align-items:center;padding:6px 20px 6px 36px;background:#15151a;border:none;color:#d4d4d4;font-family:ui-monospace,monospace;font-size:0.85rem;text-align:left;border-left:2px solid #60a5fa">
      <span>issue-agent</span>
      <span style="background:#1e3a5f;color:#60a5fa;padding:1px 6px;border-radius:999px;font-size:0.7rem">2</span>
    </button>
    <button style="display:flex;width:100%;justify-content:space-between;align-items:center;padding:8px 20px;background:transparent;border:none;color:#b8b8b8;font-family:inherit;font-size:0.9rem;text-align:left;border-left:2px solid transparent">
      <span>ambience</span>
      <span style="background:#1a1a1f;color:#555;padding:2px 8px;border-radius:999px;font-size:0.75rem;font-family:ui-monospace,monospace">1</span>
    </button>
  </div>
</div>
</body></html>
