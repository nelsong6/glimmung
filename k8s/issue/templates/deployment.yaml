{{- if eq (include "glimmung-issue.renderHot" .) "true" }}
{{- if not .Values.image.tag -}}
{{- fail "image.tag is required (the per-issue image tag built by az acr build)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "glimmung-issue.resourceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: glimmung-issue
    app.kubernetes.io/instance: {{ include "glimmung-issue.resourceName" . }}
    {{- if .Values.prNumber }}
    glimmung.io/pr: {{ .Values.prNumber | quote }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ include "glimmung-issue.resourceName" . }}
  template:
    metadata:
      {{- if .Values.observability.scrapeAnnotations.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
      {{- end }}
      labels:
        app.kubernetes.io/name: glimmung-issue
        app.kubernetes.io/instance: {{ include "glimmung-issue.resourceName" . }}
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      {{- end }}
      containers:
        - name: glimmung
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
          command:
            - /app/glimmung-supervisor
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          env:
            # POSTGRES_HOST and POSTGRES_DATABASE come from the Secret
            # materialized by ExternalSecret or shared with prod. POSTGRES_USER
            # is the workload-identity principal name, not a secret.
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            {{- if (eq (include "glimmung-issue.isTestEnv" .) "true") }}
            - name: CONTROL_PLANE_LOOPS_ENABLED
              value: "false"
            {{- end }}
            {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
            - name: GLIMMUNG_SUPERVISOR_CHILD
              value: {{ .Values.hotSwapBackend.childCommand | quote }}
            - name: GLIMMUNG_SUPERVISOR_HOT_ARTIFACT
              value: {{ .Values.hotSwapBackend.target | quote }}
            - name: GLIMMUNG_SUPERVISOR_RESTART_ENABLED
              value: "true"
            {{- end }}
            {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.staticOverride.enabled }}
            - name: GLIMMUNG_STATIC_OVERRIDE_DIR
              value: {{ .Values.staticOverride.mountPath | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.configMapName }}
            - secretRef:
                name: {{ .Values.secretName }}
          {{- if or (and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.staticOverride.enabled) (and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled) }}
          volumeMounts:
            {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
            - name: hot-backend
              mountPath: {{ .Values.hotSwapBackend.mountPath | quote }}
            {{- end }}
            {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.staticOverride.enabled }}
            - name: static-override
              mountPath: {{ .Values.staticOverride.mountPath | quote }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.staticOverride.enabled }}
        - name: {{ .Values.staticOverride.writerContainerName }}
          image: {{ .Values.staticOverride.writerImage | quote }}
          imagePullPolicy: {{ .Values.staticOverride.writerImagePullPolicy }}
          command:
            - sh
            - -c
            - |
              mkdir -p {{ .Values.staticOverride.mountPath | quote }}
              while true; do sleep 3600; done
          volumeMounts:
            - name: static-override
              mountPath: {{ .Values.staticOverride.mountPath | quote }}
        {{- end }}
      {{- if or (and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.staticOverride.enabled) (and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled) }}
      volumes:
        {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.hotSwapBackend.enabled }}
        - name: hot-backend
          emptyDir: {}
        {{- end }}
        {{- if and (eq (include "glimmung-issue.isTestEnv" .) "true") .Values.staticOverride.enabled }}
        - name: static-override
          emptyDir: {}
        {{- end }}
      {{- end }}
{{- end }}
