{{- if not .Values.image.tag -}}
{{- fail "image.tag is required (the per-issue image tag built by az acr build)" -}}
{{- end -}}
{{- if not .Values.hostname -}}
{{- fail "hostname is required (e.g. issue-12-RUNID-SHA.glimmung.dev.romaine.life)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: glimmung-issue
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- if .Values.prNumber }}
    glimmung.io/pr: {{ .Values.prNumber | quote }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glimmung-issue
        app.kubernetes.io/instance: {{ .Release.Name }}
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
        - name: glimmung
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
