{{- if eq (include "glimmung-issue.renderWarm" .) "true" }}
{{- if not .Values.hostname -}}
{{- fail "hostname is required (e.g. issue-12-RUNID-SHA.glimmung.dev.romaine.life)" -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "glimmung-issue.resourceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: glimmung-issue
    app.kubernetes.io/instance: {{ include "glimmung-issue.resourceName" . }}
    {{- if .Values.prNumber }}
    glimmung.io/pr: {{ .Values.prNumber | quote }}
    {{- end }}
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    # Gateway parentRef gives ExternalDNS a source for the per-issue A
    # record; XListenerSet handles HTTPS on the wildcard listener.
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayName }}
      namespace: {{ .Values.gatewayNamespace }}
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: {{ .Values.attachListenerSet }}
      namespace: {{ .Values.attachListenerSetNamespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "glimmung-issue.resourceName" . }}
          port: 80
          weight: 1
{{- end }}
