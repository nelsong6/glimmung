# Per-issue helm release values. The agent-run.yml workflow overrides
# `image.tag`, `hostname`, and `prNumber` on each install via --set;
# everything else is shared with prod (same SA, same Secret, same
# Postgres-backed datastore).

image:
  repository: romainecr.azurecr.io/glimmung
  # SHA-pinned, kept in lockstep with k8s/values.yaml. The build workflow
  # rewrites BOTH files on every push to main via a `[skip ci]` follow-up
  # commit (see .github/workflows/build.yaml), so the per-issue chart
  # always defaults to the same image prod is running. Per-PR installs
  # (agent-run.yml) and Glimmung-managed test slots still override this
  # via --set image.tag=<their tag> when they want a different image.
  # The chart's deployment template fails if the resolved tag is empty,
  # so an unsynced bump or a misconfigured override still fails loudly.
  # Quote so all-digit short SHAs aren't reformatted as scientific notation.
  tag: "app-7cd13fe5b04afa082068a3b902bc65c751e283d4da72390745a531cbe7ccbfb2"
  pullPolicy: IfNotPresent

# Public hostname for the validation env. Set per-install to
# <slug>.glimmung.dev.romaine.life by the workflow. The HTTPRoute
# attaches to the wildcard XListenerSet provisioned by the prod chart
# (k8s/templates/wildcard-listenerset.yaml), so no per-install cert or
# listener is needed.
hostname: ""

renderMode: normal

testEnv:
  slotName: ""

# Existing infrastructure that this chart's workload references. In normal
# per-issue installs these already exist in the shared glimmung namespace. In
# warm test-slot installs this chart creates slot-scoped copies in the release
# namespace.
serviceAccount: infra-shared
serviceAccountClientId: "3644b9f0-2eb0-42dd-92a4-696f9a3ca090"
configMapName: glimmung-config
secretName: glimmung-secrets

staticOverride:
  enabled: true
  mountPath: /var/run/glimmung-static-override
  writerContainerName: static-writer
  writerImage: alpine:3.20
  writerImagePullPolicy: IfNotPresent

hotSwapBackend:
  enabled: true
  mountPath: /var/run/glimmung-hot
  target: /var/run/glimmung-hot/glimmung
  childCommand: /app/glimmung

config: {}

externalSecret:
  storeName: ng6-glimmung
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  keys:
    - envVar: GITHUB_APP_ID
      kvKey: glimmung-github-app-id
    - envVar: GITHUB_APP_INSTALLATION_ID
      kvKey: glimmung-github-app-installation-id
    - envVar: GITHUB_APP_PRIVATE_KEY
      kvKey: glimmung-github-app-private-key
    - envVar: GITHUB_WEBHOOK_SECRET
      kvKey: glimmung-github-webhook-secret
    # Postgres connection. Warm test slots create their own ExternalSecret in
    # the slot namespace, so keep this list in step with the prod chart.
    - envVar: POSTGRES_HOST
      kvKey: glimmung-pg-host
    - envVar: POSTGRES_DATABASE
      kvKey: glimmung-pg-database

# Postgres workload-identity user. Not a secret; auth comes from the pod's
# federated workload identity.
postgres:
  user: glimmung-identity

# The wildcard XListenerSet that per-install HTTPRoutes attach to. Production
# and per-issue releases install in `glimmung`; native test slots install into
# slot namespaces and attach back to this shared listener.
attachListenerSet: glimmung-wildcard
attachListenerSetNamespace: glimmung

# ExternalDNS reads Gateway parentRefs from HTTPRoutes to create DNS
# records. The XListenerSet serves HTTPS; this Gateway parentRef makes
# the per-issue validation hostname resolvable.
gatewayName: main
gatewayNamespace: envoy-gateway-system

# Surfaced for cleanup-by-label. The native workflow sets
# --set prNumber=<N> after the PR opens so the cleanup workflow
# (agent-pr-cleanup.yml) can find releases by label and uninstall them.
prNumber: ""

# Prometheus instrumentation. Per-issue releases are ephemeral and not
# normally scraped, so even the pod scrape annotations default off. The
# /metrics endpoint is always live for ad-hoc curl/portforward debugging.
# See docs/observability.md.
observability:
  scrapeAnnotations:
    enabled: false
