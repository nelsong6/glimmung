image:
  repository: romainecr.azurecr.io/glimmung
  # SHA-pinned. The build workflow rewrites this line on every push to main
  # via a `[skip ci]` follow-up commit. Quote the value so all-digit short
  # SHAs aren't reformatted as scientific notation by YAML.
  tag: "a844dbb"
  pullPolicy: IfNotPresent

namespace: glimmung
serviceAccount: infra-shared
# Dedicated Glimmung app identity from tofu/identity.tf's
# `glimmung_dedicated_identity_client_id` output.
serviceAccountClientId: ""
replicas: 1

nativeRunner:
  namespace: glimmung-runs
  serviceAccount: glimmung-native-runner
  callbackBaseUrl: http://glimmung.glimmung.svc.cluster.local
  projectConcurrency: 5
  globalConcurrency: 5
  jobTtlSeconds: 259200
  namespaceRole: admin
  standbyDns:
    namespace: glimmung
    gatewayNamespace: envoy-gateway-system
    gatewayName: main
    target: ""
    defaultTtl: 300
  codexCredentials:
    enabled: true
    secretName: codex-credentials
    sourceSecretName: codex-credentials
    sourceNamespace: tank-operator
    mountPath: /etc/codex-creds

artifacts:
  storageAccount: romaineglimmungartifacts
  container: artifacts

# Optional bootstrap bridge for local/dev installs. In prod, keep this false;
# the source secret is managed in tank-operator and Reflector mirrors it from
# the annotation below. The template is retained so a fresh cluster can still
# wire the bridge declaratively if needed.
tankOperatorSecretBridge:
  enabled: false

# Cosmos DB — endpoint of the shared serverless account, database is glimmung's own.
cosmos:
  endpoint: https://romaine-cosmos-serverless.documents.azure.com:443/
  database: glimmung

# Phase 2: ingress at glimmung.romaine.life. The XListenerSet adds a
# dedicated HTTPS listener on the shared envoy-gateway with TLS
# terminating from the cert-manager-managed Secret; HTTPRoute binds
# the host to the Service.
ingress:
  enabled: true
  hostname: glimmung.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  listenerSetName: glimmung
  tlsSecret: glimmung-tls

# Wildcard cert + XListenerSet covering glimmung.dev.romaine.life AND
# *.glimmung.dev.romaine.life. Provisioned once by the prod chart so
# per-issue validation envs can attach HTTPRoutes to the listener without
# minting certs or creating listeners for every PR.
wildcard:
  enabled: true
  name: glimmung-wildcard
  tlsSecret: glimmung-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  hosts:
    - glimmung.dev.romaine.life
    - "*.glimmung.dev.romaine.life"
  allowedRoutesFrom: All

# Secrets from Key Vault via External Secrets Operator. The github-* keys are
# the dedicated Glimmung App credentials, and oauth-* keys back the MSAL test
# login flow in the frontend.
externalSecret:
  secretName: glimmung-secrets
  secretStoreName: infra-cluster-store
  secrets:
    githubAppId:
      env: GITHUB_APP_ID
      kvKey: glimmung-github-app-id
    githubAppInstallationId:
      env: GITHUB_APP_INSTALLATION_ID
      kvKey: glimmung-github-app-installation-id
    githubAppPrivateKey:
      env: GITHUB_APP_PRIVATE_KEY
      kvKey: glimmung-github-app-private-key
    githubWebhookSecret:
      env: GITHUB_WEBHOOK_SECRET
      kvKey: glimmung-github-webhook-secret
    oauthClientId:
      env: OAUTH_CLIENT_ID
      kvKey: glimmung-oauth-client-id
    oauthTestClientId:
      env: OAUTH_TEST_CLIENT_ID
      kvKey: glimmung-oauth-test-client-id
    oauthAllowedEmails:
      env: OAUTH_ALLOWED_EMAILS
      kvKey: glimmung-oauth-allowed-emails
