image:
  repository: romainecr.azurecr.io/glimmung
  # SHA-pinned. The build workflow rewrites this line on every push to main
  # via a `[skip ci]` follow-up commit. Quote the value so all-digit short
  # SHAs aren't reformatted as scientific notation by YAML.
  tag: "a6faac1"
  pullPolicy: IfNotPresent

namespace: glimmung
serviceAccount: infra-shared
# Dedicated Glimmung app identity from tofu/identity.tf's
# `glimmung_dedicated_identity_client_id` output.
serviceAccountClientId: "3644b9f0-2eb0-42dd-92a4-696f9a3ca090"
replicas: 1

nativeRunner:
  namespace: glimmung-runs
  serviceAccount: glimmung-native-runner
  callbackBaseUrl: http://glimmung.glimmung.svc.cluster.local
  projectConcurrency: 5
  globalConcurrency: 5
  jobTtlSeconds: 259200
  namespaceRole: admin
  # Dedicated native runner identity from tofu/identity.tf's
  # `glimmung_native_runner_identity_client_id` output.
  serviceAccountClientId: "a865aa27-e76e-4363-ab53-375712bd6db8"

artifacts:
  storageAccount: romaineglimmungartifacts
  container: artifacts

# In-cluster admin auth via Kubernetes service-account tokens. When enabled,
# admin endpoints (/v1/projects, /v1/workflows, /v1/hosts) accept a bearer
# token whose subject — resolved through TokenReview — matches an entry in
# K8S_SA_ALLOWLIST (default `tank-operator/tank-operator`, set in
# settings.py). Toggling this off removes the ClusterRoleBinding that grants
# the pod's SA `system:auth-delegator`, leaving Entra as the only admin path.
k8sSaAuth:
  enabled: true

# Cosmos DB — endpoint of the shared serverless account, database is glimmung's own.
cosmos:
  endpoint: https://infra-cosmos-serverless.documents.azure.com:443/
  database: glimmung

# Phase 2: ingress at glimmung.romaine.life. The XListenerSet adds a
# dedicated HTTPS listener on the shared envoy-gateway with TLS
# termination from the cert-manager Certificate. ExternalDNS picks the
# A record up off the HTTPRoute's parentRef on the main Gateway.
ingress:
  enabled: true
  hostname: glimmung.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: glimmung-tls

# Wildcard cert + XListenerSet covering glimmung.dev.romaine.life AND
# *.glimmung.dev.romaine.life. Provisioned once by the prod chart so
# per-issue helm releases (k8s/issue/) can attach their HTTPRoutes to
# this listener instead of each provisioning their own cert + listener.
# Lives in the same namespace as prod so per-issue HTTPRoutes (also in
# this namespace) attach without ReferenceGrants.
wildcardCertificate:
  enabled: true
  name: glimmung-wildcard
  tlsSecret: glimmung-wildcard-tls
  issuer: letsencrypt-prod-dns01
  allowedFromNamespaces: All
  hosts:
    - glimmung.dev.romaine.life
    - "*.glimmung.dev.romaine.life"

# ExternalSecret — pulls GitHub App credentials, webhook secret, and
# Entra config from Key Vault into a Secret the deployment envFroms.
# The github-* keys are glimmung's *dedicated* App (a GitHub App has only
# one webhook URL, so glimmung can't co-tenant on the shared App used by
# mcp-github / diagrams). Created by Nelson via the GitHub UI; the four
# `glimmung-github-*` KV secrets are set by hand.
externalSecret:
  storeName: romaine-kv
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  secretName: glimmung-secrets
  keys:
    - envVar: GITHUB_APP_ID
      kvKey: glimmung-github-app-id
    - envVar: GITHUB_APP_INSTALLATION_ID
      kvKey: glimmung-github-app-installation-id
    - envVar: GITHUB_APP_PRIVATE_KEY
      kvKey: glimmung-github-app-private-key
    - envVar: GITHUB_WEBHOOK_SECRET
      kvKey: glimmung-github-webhook-secret
    - envVar: ENTRA_CLIENT_ID
      kvKey: glimmung-oauth-client-id
    - envVar: ENTRA_TEST_CLIENT_ID
      kvKey: glimmung-oauth-test-client-id
    - envVar: ALLOWED_EMAILS
      kvKey: glimmung-oauth-allowed-emails
