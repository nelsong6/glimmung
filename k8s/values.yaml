image:
  repository: romainecr.azurecr.io/glimmung
  # SHA-pinned. The build workflow rewrites this line on every push to main
  # via a `[skip ci]` follow-up commit. Quote the value so all-digit short
  # SHAs aren't reformatted as scientific notation by YAML.
  tag: "app-5d9339dd7c481385b38cd6b47fa9c9459927d14c8359ed48d3bf53a7fb5d7323"
  pullPolicy: IfNotPresent

namespace: glimmung
serviceAccount: infra-shared
# Dedicated Glimmung app identity from tofu/identity.tf's
# `glimmung_dedicated_identity_client_id` output.
serviceAccountClientId: "3644b9f0-2eb0-42dd-92a4-696f9a3ca090"
replicas: 1

nativeRunner:
  namespace: glimmung-runs
  serviceAccount: glimmung-native-runner
  image: romainecr.azurecr.io/glimmung-native-runner:native-runner-f7ff19b613c898bcad04a8460a613c68985535b43e8ff0b2fe4d1d815352422f
  entrypoint: /app/glimmung-native-runner
  callbackBaseUrl: http://glimmung.glimmung.svc.cluster.local
  projectConcurrency: 5
  jobTtlSeconds: 259200
  namespaceRole: cluster-admin
  standbyDns:
    namespace: glimmung
    gatewayNamespace: envoy-gateway-system
    gatewayName: main
    target: ""
    defaultTtl: 300
  codexCredentials:
    enabled: true
    secretName: codex-credentials
    mountPath: /etc/codex-creds
    storeName: ng6-glimmung
    storeKind: ClusterSecretStore
    refreshInterval: 1h
    kvKey: codex-credentials
    secretKey: auth.json
  playwright:
    enabled: true
    # Built from slot-playwright/Dockerfile. The slot-playwright build workflow
    # rewrites this to a fingerprinted glimmung-slot-playwright image after
    # pushing the image to ACR.
    image: romainecr.azurecr.io/glimmung-slot-playwright:slot-playwright-12db48477387c4dd74152b7547411e7eb21f36517641b8b57122ac203275f81a
    port: 3000
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  # Dedicated native runner identity from tofu/identity.tf's
  # `glimmung_native_runner_identity_client_id` output.
  serviceAccountClientId: "a865aa27-e76e-4363-ab53-375712bd6db8"

artifacts:
  storageAccount: romaineglimmungartifacts
  container: artifacts

config:
  name: glimmung-config

# In-cluster admin auth via Kubernetes service-account tokens. When enabled,
# admin endpoints (/v1/projects, /v1/workflows, /v1/issues) accept a bearer
# token whose subject — resolved through TokenReview — matches an entry in
# K8S_SA_ALLOWLIST. Toggling this off removes the ClusterRoleBinding that grants
# the pod's SA `system:auth-delegator`, leaving Entra as the only admin path.
k8sSaAuth:
  enabled: true
  allowlist: tank-operator/tank-operator,mcp-glimmung/mcp-glimmung

# Glimmung-owned auth.romaine.life slot origin reconciler. Glimmung calls
# the admin surface on the auth service to set / clear per-project slot
# wildcards (https://*.<record_base>) in the managed_origin store. Inbound
# auth on the admin surface is a projected SA token with audience scoped
# to auth.romaine.life; the deployment mounts that token below. See
# nelsong6/glimmung#142 stage 2.
authRomaineLife:
  baseUrl: https://auth.romaine.life
  # In-pod mount path for the projected SA token. The token file lands
  # at {tokenMountPath}/token, and AUTH_ROMAINE_LIFE_TOKEN_PATH points
  # there explicitly. The mount path is also reused as the projected
  # token's audience in deployment.yaml.
  tokenMountPath: /var/run/secrets/auth.romaine.life

# Phase 2: ingress at glimmung.romaine.life. The XListenerSet adds a
# dedicated HTTPS listener on the shared envoy-gateway with TLS
# termination from the cert-manager Certificate. ExternalDNS picks the
# A record up off the HTTPRoute's parentRef on the main Gateway.
ingress:
  enabled: true
  hostname: glimmung.romaine.life
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: glimmung-tls

# Wildcard cert + XListenerSet covering glimmung.dev.romaine.life AND
# *.glimmung.dev.romaine.life. Provisioned once by the prod chart so
# per-issue helm releases (k8s/issue/) can attach their HTTPRoutes to
# this listener instead of each provisioning their own cert + listener.
# Lives in the same namespace as prod so per-issue HTTPRoutes (also in
# this namespace) attach without ReferenceGrants.
wildcardCertificate:
  enabled: true
  name: glimmung-wildcard
  tlsSecret: glimmung-wildcard-tls
  issuer: letsencrypt-prod-dns01
  allowedFromNamespaces: All
  hosts:
    - glimmung.dev.romaine.life
    - "*.glimmung.dev.romaine.life"

# ExternalSecret — pulls GitHub App credentials, webhook secret, and
# Entra config from Key Vault into a Secret the deployment envFroms.
# The github-* keys are glimmung's *dedicated* App (a GitHub App has only
# one webhook URL, so glimmung can't co-tenant on the shared App used by
# mcp-github / diagrams). Created by Nelson via the GitHub UI; the four
# `glimmung-github-*` KV secrets are set by hand.
externalSecret:
  createStore: true
  storeName: ng6-glimmung
  storeKind: ClusterSecretStore
  vaultUrl: https://ng6-glimmung.vault.azure.net/
  refreshInterval: 1h
  secretName: glimmung-secrets
  keys:
    - envVar: GITHUB_APP_ID
      kvKey: glimmung-github-app-id
    - envVar: GITHUB_APP_INSTALLATION_ID
      kvKey: glimmung-github-app-installation-id
    - envVar: GITHUB_APP_PRIVATE_KEY
      kvKey: glimmung-github-app-private-key
    - envVar: GITHUB_WEBHOOK_SECRET
      kvKey: glimmung-github-webhook-secret
    # Postgres connection — host and database name published by
    # tofu/postgres.tf at Stage 1. The break-glass admin password
    # (`glimmung-pg-admin-password` in KV) is deliberately NOT
    # materialized here; the pod authenticates via workload identity,
    # not a static password.
    - envVar: POSTGRES_HOST
      kvKey: glimmung-pg-host
    - envVar: POSTGRES_DATABASE
      kvKey: glimmung-pg-database

# Postgres workload-identity user. This is the name of the UAMI
# (azurerm_user_assigned_identity.glimmung_dedicated) registered as
# AAD admin on glimmung-pg by tofu/postgres.tf. Not a secret — the
# AAD token mints from the federated credential, not from this name.
postgres:
  user: glimmung-identity

# Prometheus instrumentation. Glimmung always serves /metrics on the
# existing app port (alongside /healthz); the toggles below only control
# the ServiceMonitor CRD and pod-level scrape annotations. Default off so
# the chart installs cleanly in clusters that don't run the Prometheus
# Operator — turn on per-environment when Prometheus is present.
# See docs/observability.md for the metric families and label policy.
observability:
  # ServiceMonitor (monitoring.coreos.com/v1) for Prometheus Operator. Requires
  # the CRD; chart render fails if the CRD is absent and this is enabled.
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # Namespace the ServiceMonitor lands in. Empty = chart namespace.
    namespace: ""
    # Extra labels for Prometheus selectors (e.g. release: kube-prometheus).
    labels: {}
  # Pod-level scrape annotations for native Prometheus discovery without
  # the Operator. Independent of serviceMonitor — turn either or both on.
  scrapeAnnotations:
    enabled: false
