apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: glimmung-native-launcher
  namespace: {{ .Values.nativeRunner.namespace }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: glimmung-native-launcher
  namespace: {{ .Values.nativeRunner.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: glimmung-native-launcher
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount }}
    namespace: {{ .Values.namespace }}
