{{- if .Values.nativeRunner.codexCredentials.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.nativeRunner.codexCredentials.secretName }}
  namespace: {{ .Values.nativeRunner.namespace }}
spec:
  refreshInterval: {{ .Values.nativeRunner.codexCredentials.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.nativeRunner.codexCredentials.storeName }}
    kind: {{ .Values.nativeRunner.codexCredentials.storeKind }}
  target:
    name: {{ .Values.nativeRunner.codexCredentials.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.nativeRunner.codexCredentials.secretKey }}
      remoteRef:
        key: {{ .Values.nativeRunner.codexCredentials.kvKey }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
