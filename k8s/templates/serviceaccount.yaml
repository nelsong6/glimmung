apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount }}
  namespace: {{ .Values.namespace }}
  annotations:
    # Wired in tofu/identity.tf — fed cred subject is
    # system:serviceaccount:glimmung:infra-shared, identity is
    # `glimmung-identity` (Cosmos data contributor on dbs/glimmung,
    # nothing else). Replaces the prior reuse of infra-shared-identity
    # which held vault-wide / account-wide / sub-wide RBAC for every
    # opted-in app.
    azure.workload.identity/client-id: {{ .Values.serviceAccountClientId | quote }}
  labels:
    azure.workload.identity/use: "true"
