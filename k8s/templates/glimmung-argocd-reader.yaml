# Grants the glimmung app pod (infra-shared SA) read access to ArgoCD
# Application objects so it can discover chart paths for test slot provisioning.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: glimmung-argocd-reader
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: glimmung-argocd-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: glimmung-argocd-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount }}
    namespace: {{ .Values.namespace }}
