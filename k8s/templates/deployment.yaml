apiVersion: apps/v1
kind: Deployment
metadata:
  name: glimmung
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: glimmung
  template:
    metadata:
      labels:
        app: glimmung
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
        - name: glimmung
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecret.secretName }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
