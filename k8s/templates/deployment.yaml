apiVersion: apps/v1
kind: Deployment
metadata:
  name: glimmung
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: glimmung
  template:
    metadata:
      annotations:
        glimmung.io/service-account-client-id: {{ .Values.serviceAccountClientId | quote }}
      labels:
        app: glimmung
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
        - name: glimmung
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
            - name: NATIVE_RUNNER_NAMESPACE
              value: {{ .Values.nativeRunner.namespace | quote }}
            - name: NATIVE_RUNNER_SERVICE_ACCOUNT
              value: {{ .Values.nativeRunner.serviceAccount | quote }}
            - name: NATIVE_RUNNER_CALLBACK_BASE_URL
              value: {{ .Values.nativeRunner.callbackBaseUrl | quote }}
            - name: NATIVE_RUNNER_PROJECT_CONCURRENCY
              value: {{ .Values.nativeRunner.projectConcurrency | quote }}
            - name: NATIVE_RUNNER_GLOBAL_CONCURRENCY
              value: {{ .Values.nativeRunner.globalConcurrency | quote }}
            - name: NATIVE_RUNNER_JOB_TTL_SECONDS
              value: {{ .Values.nativeRunner.jobTtlSeconds | quote }}
            - name: NATIVE_RUNNER_NAMESPACE_ROLE
              value: {{ .Values.nativeRunner.namespaceRole | quote }}
            - name: NATIVE_STANDBY_DNS_NAMESPACE
              value: {{ .Values.nativeRunner.standbyDns.namespace | quote }}
            - name: NATIVE_STANDBY_DNS_GATEWAY_NAMESPACE
              value: {{ .Values.nativeRunner.standbyDns.gatewayNamespace | quote }}
            - name: NATIVE_STANDBY_DNS_GATEWAY_NAME
              value: {{ .Values.nativeRunner.standbyDns.gatewayName | quote }}
            - name: NATIVE_STANDBY_DNS_TARGET
              value: {{ .Values.nativeRunner.standbyDns.target | quote }}
            - name: NATIVE_STANDBY_DNS_DEFAULT_TTL
              value: {{ .Values.nativeRunner.standbyDns.defaultTtl | quote }}
            - name: NATIVE_RUNNER_CODEX_CREDENTIALS_SECRET
              value: {{ .Values.nativeRunner.codexCredentials.secretName | quote }}
            - name: NATIVE_RUNNER_CODEX_CREDENTIALS_MOUNT_PATH
              value: {{ .Values.nativeRunner.codexCredentials.mountPath | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_ENABLED
              value: {{ .Values.nativeRunner.playwright.enabled | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_IMAGE
              value: {{ .Values.nativeRunner.playwright.image | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_PORT
              value: {{ .Values.nativeRunner.playwright.port | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_CPU_REQUEST
              value: {{ .Values.nativeRunner.playwright.resources.requests.cpu | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_MEMORY_REQUEST
              value: {{ .Values.nativeRunner.playwright.resources.requests.memory | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_CPU_LIMIT
              value: {{ .Values.nativeRunner.playwright.resources.limits.cpu | quote }}
            - name: NATIVE_RUNNER_PLAYWRIGHT_MEMORY_LIMIT
              value: {{ .Values.nativeRunner.playwright.resources.limits.memory | quote }}
            - name: ARTIFACTS_STORAGE_ACCOUNT
              value: {{ .Values.artifacts.storageAccount | quote }}
            - name: ARTIFACTS_CONTAINER
              value: {{ .Values.artifacts.container | quote }}
{{ if .Values.k8sSaAuth.enabled }}
            - name: K8S_SA_ALLOWLIST
              value: {{ .Values.k8sSaAuth.allowlist | quote }}
{{ end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.config.name }}
            - secretRef:
                name: {{ .Values.externalSecret.secretName }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
