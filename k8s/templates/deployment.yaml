apiVersion: apps/v1
kind: Deployment
metadata:
  name: glimmung
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: glimmung
  template:
    metadata:
      labels:
        app: glimmung
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      # Don't auto-inject {SERVICE_NAME}_PORT=tcp://… style env vars from
      # every Service in the namespace. They're a pre-DNS legacy pattern,
      # they pollute the env, and they collide with our own GLIMMUNG_*
      # config variables. Use cluster DNS instead.
      enableServiceLinks: false
      containers:
        - name: glimmung
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: GLIMMUNG_COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: GLIMMUNG_COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
