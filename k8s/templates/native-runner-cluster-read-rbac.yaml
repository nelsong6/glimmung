apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: glimmung-native-runner-cluster-read
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: glimmung-native-runner-cluster-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: glimmung-native-runner-cluster-read
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nativeRunner.serviceAccount }}
    namespace: {{ .Values.nativeRunner.namespace }}
