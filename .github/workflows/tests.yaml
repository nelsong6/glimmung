name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Run pytest with fake Cosmos
        run: uv run --extra dev pytest tests

  live-cosmos-smoke:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Install uv
        run: python -m pip install uv

      - name: Run focused live Cosmos smoke
        env:
          GLIMMUNG_TEST_COSMOS: live
          GLIMMUNG_TEST_PREFIX: "ci-${{ github.run_id }}-${{ github.run_attempt }}:"
        run: uv run --extra dev pytest tests/test_locks.py -q
