name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

  check-removed-msal:
    name: Removed MSAL / Entra surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against MSAL/Entra/allowlist reintroduction
        run: node scripts/check-removed-msal.mjs

  check-handler-5xx-migration:
    name: Handler 5xx observability contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against writeProblem 5xx (must use writeInternalError)
        run: node scripts/check-handler-5xx-migration.mjs

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  live-cosmos-smoke:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Run Go live Cosmos smoke
        env:
          COSMOS_ENDPOINT: https://infra-cosmos-serverless.documents.azure.com:443/
          COSMOS_DATABASE: glimmung
          GLIMMUNG_TEST_COSMOS: live
          GLIMMUNG_TEST_PREFIX: "ci-${{ github.run_id }}-${{ github.run_attempt }}"
        run: go test ./internal/store/cosmos -run TestLiveCosmosLockLifecycle -count=1 -v
