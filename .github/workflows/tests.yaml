name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

  check-removed-msal:
    name: Removed MSAL / Entra surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against MSAL/Entra/allowlist reintroduction
        run: node scripts/check-removed-msal.mjs

  check-removed-retired-store:
    name: Removed retired store surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against retired store surface reintroduction
        run: node scripts/check-removed-retired-store.mjs

  check-handler-5xx-migration:
    name: Handler 5xx observability contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against writeProblem 5xx (must use writeInternalError)
        run: node scripts/check-handler-5xx-migration.mjs

  check-503-observability:
    name: Deliberate 503 observability contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against silent writeProblem 503s for operational signals
        run: node scripts/check-503-observability.mjs

  check-slot-cleanup-migration:
    name: Slot cleanup migration contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against retired legacy embedded-slot-array surface + PR #525 race-fix revert
        run: node scripts/check-slot-cleanup-migration.mjs

  check-chart-image-tag-sync:
    name: Chart image.tag lockstep contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against prod/issue chart image.tag drift
        run: node scripts/check-chart-image-tag-sync.mjs

  check-removed-og-svg:
    name: Removed OG SVG renderer surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard against retired SVG OG renderer reintroduction
        run: node scripts/check-removed-og-svg.mjs

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
