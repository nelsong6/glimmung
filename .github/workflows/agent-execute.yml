name: Agent Run — agent-execute

run-name: "issue ${{ inputs.issue_number || inputs.issue_id }} agent-execute ${{ inputs.issue_title }} (${{ inputs.host }})"

# Phase 2 of the multi-phase agent-run pipeline (glimmung#102).
# Runs the Claude agent against the validation env that env-prep
# already stood up (validation_url + release_name + prod_namespace +
# image_tag come in as workflow_dispatch inputs, threaded through by
# glimmung's runtime substitution path — glimmung#101).
#
# After the agent Job completes, this phase rebuilds the validation
# env from the agent's branch, runs the screenshot pass, uploads, and
# fires the final completed callback. No outputs declared in the
# PhaseSpec — this is the terminal user phase; glimmung opens the PR
# (or hands off to the consumer's pr step depending on pr.enabled).

on:
  workflow_dispatch:
    inputs:
      lease_id:
        description: Glimmung lease ID (ULID)
        required: true
        type: string
      host:
        description: Glimmung slot host (e.g. glimmung-slot-1)
        required: true
        type: string
      issue_number:
        description: Legacy GitHub issue number to address, when present.
        required: false
        type: string
      issue_title:
        description: Issue title (informational)
        required: false
        type: string
      issue_id:
        description: Glimmung Issue id (ULID, optional).
        required: false
        type: string
      gh_event:
        description: Originating GitHub event (informational)
        required: false
        type: string
      gh_action:
        description: Originating GitHub action (informational)
        required: false
        type: string
      run_id:
        description: Glimmung Run ULID.
        required: true
        type: string
      attempt_index:
        description: 0-based attempt index for this phase.
        required: false
        type: string
      prior_verification_artifact_url:
        description: Reserved for verify-loop recycle (unused on this workflow).
        required: false
        type: string
      feedback:
        description: Reserved for PR-feedback recycle (unused on this workflow).
        required: false
        type: string
      pr_number:
        description: Existing PR number on a recycle dispatch.
        required: false
        type: string
      work_context_id:
        description: Glimmung work context id, when this run belongs to a Playbook context.
        required: false
        type: string
      work_context_branch:
        description: Branch this run should mutate. Defaults to glimmung/<run_id>.
        required: false
        type: string
      work_context_base_ref:
        description: Base ref for PR/integration work. Defaults to main.
        required: false
        type: string
      work_context_state:
        description: Work context state for observability.
        required: false
        type: string
      # ── Inputs threaded from env-prep's outputs (glimmung#101) ──
      validation_url:
        description: Live preview env URL stood up by env-prep.
        required: true
        type: string
      release_name:
        description: Helm release name env-prep used. Reused for rebuild.
        required: true
        type: string
      prod_namespace:
        description: Namespace the release lives in (always `glimmung`).
        required: true
        type: string
      image_tag:
        description: Initial image tag env-prep built. Used as the prefix
          for the rebuild tag.
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  GLIMMUNG_BASE: https://glimmung.romaine.life
  GLIMMUNG_PROJECT: glimmung
  AGENT_CONTAINER_TAG: latest
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  route:
    name: Verify glimmung lease
    runs-on: ubuntu-latest
    steps:
      - name: Verify glimmung lease
        env:
          LEASE_ID: ${{ inputs.lease_id }}
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          resp=$(curl -fsS "${GLIMMUNG_BASE}/v1/lease/${LEASE_ID}?project=${GLIMMUNG_PROJECT}")
          state=$(printf '%s' "$resp" | jq -r .state)
          host=$(printf '%s' "$resp" | jq -r .host)
          if [[ "$state" != "active" ]]; then
            echo "::error::lease ${LEASE_ID} state=${state} (expected active)"
            exit 1
          fi
          if [[ "$host" != "$HOST" ]]; then
            echo "::error::lease ${LEASE_ID} host=${host} (expected ${HOST})"
            exit 1
          fi
          echo "lease verified: ${LEASE_ID} active on ${HOST}"

  agent-execute:
    name: Run agent + screenshots + upload
    needs: route
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      GLIMMUNG_ISSUE_ID: ${{ inputs.issue_id }}
      ISSUE_TITLE: ${{ inputs.issue_title }}
      VALIDATION_URL: ${{ inputs.validation_url }}
      RELEASE_NAME: ${{ inputs.release_name }}
      PROD_NAMESPACE: ${{ inputs.prod_namespace }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      BRANCH_NAME: ${{ inputs.work_context_branch || format('glimmung/{0}', inputs.run_id) }}
      BASE_REF: ${{ inputs.work_context_base_ref || 'main' }}
      WORK_CONTEXT_ID: ${{ inputs.work_context_id }}
      WORK_CONTEXT_STATE: ${{ inputs.work_context_state }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Install glimmung-agent package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./mcp

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch GitHub App credentials from Key Vault
        env:
          KV_NAME: ${{ vars.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          app_id=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-id" --query value -o tsv)
          pem=$(az keyvault secret show --vault-name "$KV_NAME" --name "github-app-private-key" --query value -o tsv)
          echo "::add-mask::${app_id}"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "::add-mask::${line}"
          done <<< "$pem"
          echo "GH_APP_ID=${app_id}" >> "$GITHUB_ENV"
          {
            echo "GH_APP_PRIVATE_KEY<<KEY_EOF"
            echo "$pem"
            echo "KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Read infra-bootstrap tofu outputs
        # env-prep doesn't emit storage account info because nothing in
        # phase 1 needed it. agent-execute pulls the screenshot
        # storage values fresh from tofu state.
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cat > "${work}/main.tf" <<'EOF'
          terraform {
            backend "azurerm" {}
          }
          EOF
          (
            cd "${work}"
            tofu init \
              -backend-config="resource_group_name=infra" \
              -backend-config="storage_account_name=nelsontofu" \
              -backend-config="container_name=tfstate" \
              -backend-config="key=infra-bootstrap.tfstate"
            {
              echo "AZURE_AKS_RESOURCE_GROUP=$(tofu output -raw resource_group_name)"
              echo "AZURE_AKS_CLUSTER_NAME=$(tofu output -raw aks_cluster_name)"
              echo "AGENT_SCREENSHOT_STORAGE_ACCOUNT=$(tofu output -raw agent_screenshots_storage_account)"
              echo "AGENT_SCREENSHOT_CONTAINER=$(tofu output -raw agent_screenshots_container_glimmung)"
              echo "AGENT_SCREENSHOT_CONTAINER_URL=$(tofu output -raw agent_screenshots_container_url_glimmung)"
            } >> "$GITHUB_ENV"
          )

      - name: Set AKS context
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AZURE_AKS_RESOURCE_GROUP" \
            --name "$AZURE_AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Notify glimmung — agent-execute started
        # Stamps THIS phase's GHA workflow_run_id on the agent-execute
        # PhaseAttempt. validation_url is already on the Run from
        # env-prep's started callback (first-arrival-wins idempotency
        # in record_started, so re-stamping here would be a no-op).
        env:
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          payload=$(jq -nc --argjson rid "${GITHUB_RUN_ID}" '{workflow_run_id: $rid}')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${GLIMMUNG_BASE}/v1/runs/${GLIMMUNG_PROJECT}/${GLIMMUNG_RUN_ID}/started" \
            || echo "::warning::failed to post started callback to glimmung; continuing"

      - name: Compute run-scoped variables
        env:
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          # AGENT_NAMESPACE follows the same `glimmung-issue-.*` pattern
          # the reflector matches on so the claude-oauth-ca ConfigMap
          # auto-replicates. Slug is reused from env-prep's IMAGE_TAG.
          if [ -n "${ISSUE_NUMBER}" ] && [ "${ISSUE_NUMBER}" != "0" ]; then
            issue_url="https://github.com/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}"
          else
            issue_url="${GLIMMUNG_BASE}/issues/${GLIMMUNG_PROJECT}/${GLIMMUNG_ISSUE_ID}"
          fi
          {
            echo "AGENT_NAMESPACE=glimmung-${IMAGE_TAG}"
            echo "JOB_NAME=agent-${IMAGE_TAG}"
            echo "ISSUE_URL=${issue_url}"
          } >> "$GITHUB_ENV"

      - name: Create per-run agent namespace
        run: |
          set -euo pipefail
          kubectl create namespace "${AGENT_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve claude-api-proxy ClusterIP
        run: |
          set -euo pipefail
          ip=$(kubectl -n tank-operator get svc claude-api-proxy -o jsonpath='{.spec.clusterIP}')
          if [ -z "$ip" ]; then
            echo "::error::claude-api-proxy Service not found in tank-operator namespace"
            exit 1
          fi
          echo "PROXY_IP=${ip}" >> "$GITHUB_ENV"

      - name: Provision agent ConfigMap + GitHub-token Secret
        run: |
          set -euo pipefail
          kubectl -n "${AGENT_NAMESPACE}" create configmap agent-config \
            --from-file=prompt.md=.github/agent/prompt.md \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${AGENT_NAMESPACE}" create secret generic agent-github-token \
            --from-literal=token="${GITHUB_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Apply agent Job
        run: |
          set -euo pipefail
          python -m glimmung_agent.cli apply-agent-job \
            --namespace "${AGENT_NAMESPACE}" \
            --job-name "${JOB_NAME}" \
            --issue-number "${ISSUE_NUMBER}" \
            --issue-id "${GLIMMUNG_ISSUE_ID}" \
            --issue-title "${ISSUE_TITLE}" \
            --issue-url "${ISSUE_URL}" \
            --validation-url "${VALIDATION_URL}" \
            --branch-name "${BRANCH_NAME}" \
            --proxy-ip "${PROXY_IP}" \
            --agent-container-tag "${AGENT_CONTAINER_TAG}"

      - name: Stream + wait for Job
        id: job
        run: |
          set -euo pipefail
          python -m glimmung_agent.cli wait-agent-job \
            --namespace "${AGENT_NAMESPACE}" \
            --job-name "${JOB_NAME}" \
            --timeout-seconds 1800

      - name: Capture agent event log
        if: always()
        run: |
          set -euo pipefail
          pod=$(kubectl -n "${AGENT_NAMESPACE}" get pods -l "job-name=${JOB_NAME}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -z "${pod}" ]; then
            echo "no pod found for job ${JOB_NAME}; skipping event capture"
            : > /tmp/agent-pod.log
            : > /tmp/agent-events.jsonl
            exit 0
          fi
          kubectl -n "${AGENT_NAMESPACE}" logs "${pod}" > /tmp/agent-pod.log || true
          grep -E '^\{' /tmp/agent-pod.log > /tmp/agent-events.jsonl || true
          echo "captured $(wc -l < /tmp/agent-events.jsonl) event lines from ${pod}"

      - name: Capture agent evidence from pod log
        id: evidence
        if: success()
        run: |
          set -euo pipefail
          mkdir -p /tmp/evidence
          if grep -q '===EVIDENCE-TAR-START===' /tmp/agent-pod.log; then
            if ! sed -n '/===EVIDENCE-TAR-START===/,/===EVIDENCE-TAR-END===/{//!p;}' \
              /tmp/agent-pod.log \
              | base64 --decode --ignore-garbage \
              | tar -xzf - -C /tmp/evidence; then
              echo "::warning::failed to decode evidence tar from agent pod log; continuing without agent-supplied evidence"
              rm -rf /tmp/evidence
              mkdir -p /tmp/evidence
            fi
          else
            echo "::warning::no evidence tar markers found in agent pod log"
          fi
          echo "evidence files extracted:"
          find /tmp/evidence -type f 2>/dev/null | sort || true
          have_screenshots=false
          if compgen -G "/tmp/evidence/screenshots/*.png" >/dev/null; then
            have_screenshots=true
          fi
          have_notes=false
          if [ -s /tmp/evidence/notes.md ]; then
            have_notes=true
          fi
          have_summary=false
          if [ -s /tmp/evidence/summary.md ]; then
            have_summary=true
          fi
          deep_validation_url=""
          if [ -s /tmp/evidence/validation-path.txt ]; then
            path=$(head -1 /tmp/evidence/validation-path.txt | tr -d '[:space:]')
            case "${path}" in
              /*) deep_validation_url="${VALIDATION_URL}${path}" ;;
              "") ;;
              *) echo "::warning::validation-path.txt content '${path}' missing leading slash; falling back to bare host" ;;
            esac
          fi
          echo "have_screenshots=${have_screenshots}" >> "$GITHUB_OUTPUT"
          echo "have_notes=${have_notes}" >> "$GITHUB_OUTPUT"
          echo "have_summary=${have_summary}" >> "$GITHUB_OUTPUT"
          echo "deep_validation_url=${deep_validation_url}" >> "$GITHUB_OUTPUT"

      - name: Fetch agent branch onto runner
        if: success()
        run: |
          set -euo pipefail
          git fetch origin "${BRANCH_NAME}"
          git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"

      - name: Rebuild validation env from agent branch
        if: success()
        run: |
          set -euo pipefail
          rebuild_tag="${IMAGE_TAG}-r2"
          echo "REBUILT_IMAGE_TAG=${rebuild_tag}" >> "$GITHUB_ENV"
          python -m glimmung_agent.cli rebuild-validation-image \
            --release "${RELEASE_NAME}" \
            --namespace "${PROD_NAMESPACE}" \
            --branch "${BRANCH_NAME}" \
            --image-tag "${rebuild_tag}"

      - name: Wait for rebuilt validation env
        if: success()
        run: |
          set -euo pipefail
          python -m glimmung_agent.cli wait-public-preview --url "${VALIDATION_URL}"

      - name: Capture screenshot pass
        if: success()
        env:
          BASE_URL: ${{ env.VALIDATION_URL }}
          PAGES_JSON: frontend/screenshot-pages.json
          OUT_DIR: /tmp/evidence/screenshots
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          if [ ! -f "${PAGES_JSON}" ]; then
            echo "::warning::no ${PAGES_JSON}; skipping screenshot pass"
            exit 0
          fi
          mkdir -p "${OUT_DIR}"

          npm init -y >/dev/null
          npm install --no-save --silent playwright@1
          npx --yes playwright install chromium

          set +e
          node scripts/screenshot-pages.mjs > /tmp/screenshot-stdout.log 2> /tmp/screenshot-stderr.log
          rc=$?
          set -e
          cat /tmp/screenshot-stdout.log || true
          cat /tmp/screenshot-stderr.log >&2 || true

          if [ "${rc}" -ne 0 ]; then
            reason=$(head -1 /tmp/screenshot-stderr.log | sed 's/;.*$//') || true
            if [ -z "${reason}" ]; then
              reason="screenshot_capture_failed: <unknown> (script exit ${rc})"
            fi
            echo "::error::${reason}"
            if [ -n "${GLIMMUNG_RUN_ID}" ]; then
              payload=$(jq -nc --arg r "${reason}" '{reason: $r}')
              curl -sS -X POST \
                -H "Content-Type: application/json" \
                -d "${payload}" \
                "${GLIMMUNG_BASE}/v1/runs/${GLIMMUNG_PROJECT}/${GLIMMUNG_RUN_ID}/aborted" \
                || echo "::warning::failed to post typed abort to glimmung; lease-release will still fire"
            fi
            exit 1
          fi

      - name: Refresh Azure OIDC login
        if: success() && steps.evidence.outputs.have_screenshots == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Upload screenshots to Azure blob
        id: upload
        if: success() && steps.evidence.outputs.have_screenshots == 'true'
        continue-on-error: true
        env:
          STORAGE_ACCOUNT: ${{ env.AGENT_SCREENSHOT_STORAGE_ACCOUNT }}
          CONTAINER: ${{ env.AGENT_SCREENSHOT_CONTAINER }}
          CONTAINER_URL: ${{ env.AGENT_SCREENSHOT_CONTAINER_URL }}
          MAX_SCREENSHOTS: "20"
        run: |
          set -euo pipefail
          issue_ref="${ISSUE_NUMBER:-${GLIMMUNG_ISSUE_ID}}"
          issue_ref="$(printf '%s' "${issue_ref}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')"
          prefix="issue-${issue_ref}/${GITHUB_RUN_ID}"

          staging=$(mktemp -d)
          mapfile -t pngs < <(find /tmp/evidence/screenshots -maxdepth 1 -type f -name '*.png' | sort)
          total=${#pngs[@]}
          taken=0
          for f in "${pngs[@]}"; do
            [ "${taken}" -lt "${MAX_SCREENSHOTS}" ] || break
            cp "${f}" "${staging}/"
            taken=$((taken + 1))
          done
          echo "uploading ${taken}/${total} screenshots (cap ${MAX_SCREENSHOTS})"

          upload_ok=true
          if ! az storage blob upload-batch \
              --account-name "${STORAGE_ACCOUNT}" \
              --destination "${CONTAINER}" \
              --destination-path "${prefix}" \
              --source "${staging}" \
              --auth-mode login \
              --overwrite true; then
            upload_ok=false
            echo "::warning::screenshot upload failed; PR body will note this"
          fi

          {
            echo "markdown<<EOF_MD"
            echo "## Screenshots"
            echo ""
            if [ "${upload_ok}" = "false" ]; then
              echo "_Screenshot upload failed — see [run logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})._"
              echo ""
            else
              if [ "${total}" -gt "${taken}" ]; then
                echo "_Showing first ${taken} of ${total} screenshots._"
                echo ""
              fi
              for f in "${staging}"/*.png; do
                [ -e "${f}" ] || continue
                base=$(basename "${f}")
                echo "### ${base%.png}"
                echo ""
                echo "![${base%.png}](${CONTAINER_URL}/${prefix}/${base})"
                echo ""
              done
            fi
            echo "EOF_MD"
          } >> "$GITHUB_OUTPUT"

      - name: Notify glimmung — run completed
        # Terminal phase: no `outputs` declared on the PhaseSpec, so
        # the payload omits `outputs`. Glimmung's _validate_phase_outputs
        # accepts (declared empty + posted absent).
        if: success()
        env:
          GLIMMUNG_RUN_ID: ${{ inputs.run_id }}
          SCREENSHOTS_MD: ${{ steps.upload.outputs.markdown }}
        run: |
          set -euo pipefail
          summary_md=""
          if [ -s /tmp/evidence/summary.md ]; then
            summary_md="$(cat /tmp/evidence/summary.md)"
          fi
          payload=$(jq -nc \
            --argjson rid "${GITHUB_RUN_ID}" \
            --arg conclusion "success" \
            --arg shots "${SCREENSHOTS_MD}" \
            --arg summary "${summary_md}" \
            '{workflow_run_id: $rid, conclusion: $conclusion}
              + (if ($shots | length) > 0 then {screenshots_markdown: $shots} else {} end)
              + (if ($summary | length) > 0 then {summary_markdown: $summary} else {} end)')
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${GLIMMUNG_BASE}/v1/runs/${GLIMMUNG_PROJECT}/${GLIMMUNG_RUN_ID}/completed"

      - name: Label per-issue release + agent namespace by branch
        if: success() && inputs.pr_number == ''
        run: |
          set -euo pipefail
          slug="${BRANCH_NAME//\//-}"
          python -m glimmung_agent.cli label-release-branch \
            --release "${RELEASE_NAME}" \
            --namespace "${PROD_NAMESPACE}" \
            --branch-slug "${slug}" \
            || echo "::warning::failed to label release ${RELEASE_NAME} with glimmung.io/branch=${slug}"
          kubectl label namespace "${AGENT_NAMESPACE}" "glimmung.io/branch=${slug}" --overwrite \
            || echo "::warning::failed to label namespace ${AGENT_NAMESPACE} with glimmung.io/branch=${slug}"

      - name: Summarize agent run
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          events=/tmp/agent-events.jsonl
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body_file=$(mktemp)

          if [ -s "${events}" ]; then
            cost=$(jq -r 'select(.type=="result") | .total_cost_usd // 0' "${events}" \
              | awk '{s+=$1} END {printf "%.4f", s}')
            turns=$(jq -r 'select(.type=="result") | .num_turns // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            input=$(jq -r 'select(.type=="result") | .usage.input_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            output=$(jq -r 'select(.type=="result") | .usage.output_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            cache_create=$(jq -r 'select(.type=="result") | .usage.cache_creation_input_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            cache_read=$(jq -r 'select(.type=="result") | .usage.cache_read_input_tokens // 0' "${events}" \
              | awk '{s+=$1} END {printf "%d", s}')
            tools=$(jq -r 'select(.type=="assistant") | .message.content[]? | select(.type=="tool_use") | .name' "${events}" \
              | wc -l | tr -d ' ')
            tool_breakdown=$(jq -r 'select(.type=="assistant") | .message.content[]? | select(.type=="tool_use") | .name' "${events}" \
              | sort | uniq -c | sort -rn | awk '{printf "  - %s: %d\n", $2, $1}')
            {
              echo "## Agent run summary"
              echo ""
              echo "| Metric | Value |"
              echo "| --- | ---: |"
              echo "| Status | ${JOB_STATUS} |"
              echo "| Run | [${GITHUB_RUN_ID}](${run_url}) |"
              if [ -n "${ISSUE_NUMBER}" ] && [ "${ISSUE_NUMBER}" != "0" ]; then
                echo "| Issue | #${ISSUE_NUMBER} |"
              else
                echo "| Issue | ${GLIMMUNG_ISSUE_ID} |"
              fi
              echo "| Cost | \$${cost} |"
              echo "| Turns | ${turns} |"
              echo "| Tool calls | ${tools} |"
              echo "| Input tokens | ${input} |"
              echo "| Output tokens | ${output} |"
              echo "| Cache creation tokens | ${cache_create} |"
              echo "| Cache read tokens | ${cache_read} |"
              echo ""
              if [ -n "${tool_breakdown}" ]; then
                echo "### Tool calls"
                echo ""
                printf '%s\n' "${tool_breakdown}"
              fi
              if [ -s /tmp/evidence/summary.md ]; then
                echo ""
                echo "### Review summary"
                echo ""
                cat /tmp/evidence/summary.md
              fi
            } > "${body_file}"
          else
            {
              echo "## Agent run summary"
              echo ""
              echo "| Metric | Value |"
              echo "| --- | ---: |"
              echo "| Status | ${JOB_STATUS} |"
              echo "| Run | [${GITHUB_RUN_ID}](${run_url}) |"
              if [ -n "${ISSUE_NUMBER}" ] && [ "${ISSUE_NUMBER}" != "0" ]; then
                echo "| Issue | #${ISSUE_NUMBER} |"
              else
                echo "| Issue | ${GLIMMUNG_ISSUE_ID} |"
              fi
              echo ""
              echo "_No agent events captured — see run logs for failure detail._"
            } > "${body_file}"
          fi

          cat "${body_file}" >> "${GITHUB_STEP_SUMMARY}"
          if [ -n "${ISSUE_NUMBER:-}" ] && [ "${ISSUE_NUMBER}" != "0" ]; then
            gh issue comment "${ISSUE_NUMBER}" --body-file "${body_file}" \
              || echo "::warning::failed to post summary on issue #${ISSUE_NUMBER}; continuing"
          fi
          if [ -n "${PR_NUMBER:-}" ]; then
            gh pr comment "${PR_NUMBER}" --body-file "${body_file}" \
              || echo "::warning::failed to post summary comment on PR #${PR_NUMBER}; continuing"
          fi

      - name: Tear down validation env on failure
        # env-prep's tear-down only handles env-prep's own failures.
        # Failures here also need to reap the still-running env so
        # we don't orphan a helm release + agent namespace + ACR tags.
        if: failure() || cancelled()
        run: |
          set -euo pipefail
          python -m glimmung_agent.cli destroy-validation-preview \
            --release "${RELEASE_NAME}" \
            --namespace "${PROD_NAMESPACE}" || true
          kubectl delete namespace "${AGENT_NAMESPACE}" --ignore-not-found=true --wait=false || true
          if [ -n "${IMAGE_TAG:-}" ]; then
            az acr repository delete --name romainecr --image "glimmung:${IMAGE_TAG}" --yes || true
          fi
          if [ -n "${REBUILT_IMAGE_TAG:-}" ]; then
            az acr repository delete --name romainecr --image "glimmung:${REBUILT_IMAGE_TAG}" --yes || true
          fi

  release-lease:
    name: Release glimmung lease
    needs: [route, agent-execute]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Release lease
        run: |
          set -euo pipefail
          curl -fsS -X POST "${GLIMMUNG_BASE}/v1/lease/${{ inputs.lease_id }}/release?project=${GLIMMUNG_PROJECT}" >/dev/null
