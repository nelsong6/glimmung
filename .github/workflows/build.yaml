name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'README.md'
      - 'slot-playwright/**'
      - '.github/workflows/slot-playwright-build.yaml'
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub Environment scopes the OIDC token's `sub` claim presented to
    # Azure. The per-app Entra App provisioned by infra-bootstrap has two
    # federated credentials — `repo:nelsong6/<repo>:environment:dev` and
    # `repo:nelsong6/<repo>:environment:prod`. Declaring `environment:`
    # is what causes the issued token's `sub` to match one of those.
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: glimmung
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          target_ref="${INPUT_REF:-$GITHUB_SHA}"
          if full_sha="$(git rev-parse --verify "${target_ref}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${target_ref}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${target_ref}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${target_ref}"; then
            full_sha="$(git rev-parse "refs/tags/${target_ref}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${target_ref}' to a commit."
            exit 1
          fi

          git checkout --detach "$full_sha"
          echo "Resolved ${target_ref} -> ${full_sha}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - uses: docker/setup-buildx-action@v3

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          fingerprint="$(scripts/image-fingerprint.sh \
            --image app \
            --dockerfile Dockerfile \
            --context . \
            --paths 'Dockerfile .dockerignore go.mod go.sum cmd internal frontend/package.json frontend/package-lock.json frontend/index.html frontend/src frontend/tsconfig.json frontend/vite.config.ts design-system' \
            | tee /tmp/glimmung-image-fingerprint.txt \
            | awk -F= '$1 == "fingerprint" { print $2 }')"
          echo "ALIAS_TAG=app-${fingerprint}" >> "$GITHUB_ENV"

      - name: Check existing image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          if az acr repository show-tags \
              --name romainecr \
              --repository "${IMAGE}" \
              --query "[?@=='${ALIAS_TAG}'] | [0]" \
              --output tsv | grep -qx "${ALIAS_TAG}"; then
            echo "exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image ${REGISTRY}/${IMAGE}:${ALIAS_TAG}"
          else
            echo "exists=false" >>"${GITHUB_OUTPUT}"
            echo "No reusable image found for app fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.ALIAS_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app,mode=max

      - name: Bump chart image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          tag="${ALIAS_TAG}"
          # Bump the SHA-pinned image.tag in BOTH the prod chart and the
          # per-issue chart so warm Glimmung test slots — which install
          # k8s/issue without a Postgres-side override — don't drift
          # behind prod between releases. Targeted sed: only the line
          # beginning with two spaces + `tag:` under image. Quote the
          # value so YAML never reinterprets image tags.
          files=(k8s/values.yaml k8s/issue/values.yaml)
          bump() {
            for f in "${files[@]}"; do
              sed -i -E "s|^(  tag: ).*$|\1\"${tag}\"|" "$f"
            done
          }
          bump
          if git diff --quiet "${files[@]}"; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "chart: bump image tag to fingerprint ${tag} [skip ci]"
          # Concurrent builds race on these same lines. On rebase conflict
          # the latest tag wins — re-apply our sed against the post-rebase
          # tree and continue.
          for i in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git fetch origin main
            if ! git rebase origin/main; then
              git checkout --theirs "${files[@]}"
              bump
              git add "${files[@]}"
              git rebase --continue || git rebase --skip
            fi
          done
          git push origin HEAD:main
