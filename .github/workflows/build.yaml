name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: glimmung
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump chart image tag
        if: github.ref == 'refs/heads/main'
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Targeted sed: only the line beginning with two spaces + `tag:` under image.
          # Quote the value so all-digit short-SHAs (e.g. 6432731) aren't parsed as
          # numbers by YAML and emitted as scientific notation.
          bump() {
            sed -i -E "s|^(  tag: ).*$|\1\"${tag}\"|" k8s/values.yaml
          }
          bump
          if git diff --quiet k8s/values.yaml; then
            echo "no tag change"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          git commit -m "chart: bump image tag to ${tag} [skip ci]"
          # Concurrent builds race on this same line. On rebase conflict the
          # latest tag wins — re-apply our sed against the post-rebase tree
          # and continue.
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git fetch origin main
            if ! git rebase origin/main; then
              git checkout --theirs k8s/values.yaml
              bump
              git add k8s/values.yaml
              git rebase --continue || git rebase --skip
            fi
          done
          git push
